<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Calc</title>
</head>
<body>
    
    <div class="container">
        <div class="display">
            <input type="text" name="" id="" class="screen">
        </div>
        <div class="buttons">
            <button type="button" class="otherBtns erase">E</button>
            <button type="button" class="otherBtns clear">C</button>
            <button type="button" class="otherBtns percent">%</button>
            <button type="button" class="functions divide">/</button>
            <button type="button" class="num">7</button>
            <button type="button" class="num">8</button>
            <button type="button" class="num">9</button>
            <button type="button" class="functions multiply">*</button>
            <button type="button" class="num">4</button>
            <button type="button" class="num">5</button>
            <button type="button" class="num">6</button>
            <button type="button" class="functions subtract">-</button>
            <button type="button" class="num">1</button>
            <button type="button" class="num">2</button>
            <button type="button" class="num">3</button>
            <button type="button" class="functions add">+</button>
            <button type="button" class="num positiveNegative">+/-</button>
            <button type="button" class="num">0</button>
            <button type="button" class="num decimal">.</button>
            <button type="button" class=" functions equals">=</button>
        </div>
    </div>
</body>
</html>
